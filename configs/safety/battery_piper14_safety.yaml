# Diagnostic safety config for Battery Assemble Piper14 validation predictions.
# Hard deployment limits still need confirmation from the robot controller before execute mode.

dataset_stats_report: reports/battery_assemble_dataset_stats_perfect.json

checks:
  max_joint_delta_per_step: 0.2
  max_gripper_delta_per_step: 0.05
  dataset_margin_ratio: 0.2
  use_joint_limits: true
  use_delta_limits: true
  use_dataset_range_limits: true

gripper:
  gripper_min: -0.006
  gripper_max: 0.1
  source: docs/ACTION_SCHEMA.md plus Battery perfect split observed gripper range
  needs_human_confirmation: true

reporting:
  action_horizon: 16
  min_pass_rate: 0.99
  main_metric_mode: first_action
