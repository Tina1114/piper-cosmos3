dataset:
  data_root: /project/peilab/wam/physical_WM/data/pack_3_objects_plus/perfect
  config_path: configs/data/piper_dual_hdf5.yaml
  history_frames: 2
  action_horizon: 16
  image_size: 224
  stride: 1
  limit_samples: 32

model:
  name: SimpleMultiViewCNNPolicy
  history_frames: 2
  qpos_dim: 14
  action_horizon: 16
  action_dim: 14
  image_feature_dim: 128
  hidden_dim: 256

training:
  batch_size: 2
  num_workers: 0
  max_steps: 2
  learning_rate: 0.0001
  device: cpu
  output_dir: reports/baseline_piper14_debug
  checkpoint_name: baseline_piper14_debug.pt
  gripper_weight: 2.0
  smoothness_weight: 0.1

eval:
  max_batches: 2
  report: reports/baseline_piper14_eval.json
