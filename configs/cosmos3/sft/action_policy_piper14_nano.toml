# Cosmos3-Nano Piper14 Battery action-policy SFT.
#
# Required env:
#   PIPER14_ROOT=/project/peilab/wam/physical_WM/data/battery_assemble/perfect
#   PIPER14_DATA_CONFIG=/project/peilab/wam/cosmos3_cy/configs/dataset_configs/battery_assemble_hdf5.yaml
#   BASE_CHECKPOINT_PATH=<Cosmos3-Nano DCP dir>
#   WAN_VAE_PATH=<Wan2.2_VAE.pth>
#   IMAGINAIRE_OUTPUT_ROOT=/project/peilab/wam/cosmos3_cy/reports/cosmos3_piper14

[job]
task         = "vfm"
experiment   = "action_policy_piper14_nano"
project      = "cosmos3_action"
group        = "battery_piper14"
name         = "battery_piper14_cosmos3_nano"
wandb_mode   = "disabled"

[model]
precision = "bfloat16"

[model.parallelism]
data_parallel_shard_degree     = 4
data_parallel_replicate_degree = 1

[model.activation_checkpointing]
mode           = "full"
save_ops_regex = ["fmha"]

[model.tokenizer]
vae_path = "${oc.env:WAN_VAE_PATH}"

[scheduler]
cycle_lengths = [500]

[trainer]
max_iter     = 500
logging_iter = 10

[checkpoint]
load_path = "${oc.env:BASE_CHECKPOINT_PATH}"
save_iter = 100

