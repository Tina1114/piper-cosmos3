# Cosmos3-Edge base -> fresh Piper14 head, Battery Assemble 20k baseline.
#
# This is intentionally aligned with the audited Nano 20k run:
# 4-GPU FSDP, max 8 samples/rank, grad accumulation 1, 20k linear cycle,
# Generator lr 2e-4, action-head lr 1e-3, BF16, save every 500 iterations.

[job]
task         = "vfm"
experiment   = "action_policy_piper14_edge"
project      = "cosmos_battery"
group        = "edge_piper14"
name         = "battery_piper14_cosmos3_edge_base_fresh_head_20k"
wandb_mode   = "online"

[model]
precision = "bfloat16"

[model.parallelism]
data_parallel_shard_degree     = 4
data_parallel_replicate_degree = 1

[model.activation_checkpointing]
mode           = "full"
save_ops_regex = ["fmha"]

[model.tokenizer]
vae_path = "${oc.env:WAN_VAE_PATH}"

[optimizer]
lr = 2.0e-4

[scheduler]
cycle_lengths = [20000]
f_max         = [0.4]
f_min         = [0.0]
f_start       = [0.0]
warm_up_steps = [0]

[dataloader_train]
max_samples_per_batch = 8

[trainer]
max_iter        = 20000
logging_iter    = 10
grad_accum_iter = 1

[checkpoint]
load_path = "${oc.env:BASE_CHECKPOINT_PATH}"
save_iter = 500
