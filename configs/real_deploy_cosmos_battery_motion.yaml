cameras:
  use_front: true                                                                                 # subscribe head camera color stream
  use_wrist: true                                                                                 # master switch for wrist cameras (overridden by below if needed)
  use_left_wrist: true                                                                            # subscribe left-wrist camera
  use_right_wrist: true                                                                           # subscribe right-wrist camera
  use_depth_image: false                                                                          # subscribe depth streams too (current model is RGB-only)
  front_camera_name: "cam_high"                                                                   # observation key fed to model for head cam
  left_wrist_camera_name: "cam_left_wrist"                                                        # observation key for left wrist cam
  right_wrist_camera_name: "cam_right_wrist"                                                      # observation key for right wrist cam

ros_topics_dual:
  img_front_topic: "/camera_h/color/image_raw"                                                    # head camera RGB ROS topic
  img_left_topic: "/camera_l/color/image_raw"                                                     # left-wrist camera RGB ROS topic
  img_right_topic: "/camera_r/color/image_raw"                                                    # right-wrist camera RGB ROS topic
  img_front_depth_topic: "/camera_h/depth/image_raw"                                              # head camera depth (only used if use_depth_image=true)
  img_left_depth_topic: "/camera_l/depth/image_raw"                                               # left-wrist camera depth
  img_right_depth_topic: "/camera_r/depth/image_raw"                                              # right-wrist camera depth
