# RTC-style FastWAM real-robot deployment config.
#
# Paths in this file are resolved relative to this config file by the new
# FastWAMPolicyConfig loader.

fastwam:
  ckpt: "/home/agilex/World_Action_Model/physical_WM/checkpoints/ego_worse_pack3/step_020000.pt"  # model weights to load (step_xxxxxx.pt)
  dataset_stats: "/home/agilex/World_Action_Model/physical_WM/checkpoints/ego_worse_pack3/dataset_stats.json"  # state/action normalization stats from training
  task: "real_cleaning_uncond_3cam_384_1e-4"                                                      # Hydra task name (used only if train_config is null)
  config_dir: "."                                                                                 # Hydra config root, relative to this yaml
  train_config: "/home/agilex/World_Action_Model/physical_WM/checkpoints/ego_worse_pack3/config_infer.yaml"  # saved training config (14-dim/dual, must match the loaded ckpt); if set, bypasses Hydra compose
  device: "cuda:0"                                                                                # device for model inference
  mixed_precision: "bf16"                                                                         # model dtype: "no" | "fp16" | "bf16"
  prompt: "Assemble the mouse's battery."
  context_cache_dir: "/home/agilex/World_Action_Model/physical_WM/data/text_embeds_cache/stack_3_cups_gen"  # dir of precomputed T5 embeddings (<sha256>.t5_lenN.<enc>.pt)
  use_text_encoder: false                                                                         # false=read from cache; true=run T5 inline (slow + needs T5 in VRAM)
  action_horizon: 32                                                                              # # of future actions predicted per inference call (chunk length)
  num_inference_steps: 10                                                                         # flow-matching denoising steps; smaller = faster, lower quality
  seed: 42                                                                                        # RNG seed for noise sampling
  rand_device: "cpu"                                                                              # device for noise tensor (cpu for reproducibility)

policy_server:
  host: "127.0.0.1"                                                                               # RPC server bind address
  port: 8765                                                                                      # RPC server port (runtime must match)
  authkey: "fastwam"                                                                              # shared secret between server and runtime

runtime:
  arm_mode: "dual"  # "dual" (14-dim, both arms) | "right" | "left" (7-dim single arm). MUST match the served checkpoint's action dim. CLI: --arm-mode/--arm-side override this.
  action_chunk_size: 32                                                                           # # of actions kept from each predicted chunk for execution
  exp_weight_factor: 0.2                                                                   # RTC temporal-ensembling weight; higher = trust new chunks more
  rtc_debug: false                                                                                # print verbose RTC buffer logs
  rospy_rate: 100                                                                      # control loop frequency (Hz); arm receives one command every 1/rate s
  execute_actions: False                                                                         # true=actually move Piper; false=dry-run (predict only)
  move_to_initial: True                                                                        # move arms to left/right_init_position before inference; safe default false, opt in via --move-to-initial
  max_steps: null                                                                                 # max control steps; null = run until Ctrl+C or safety stop
  save_rollout: false                                                                             # persist full rollout (currently saves selected_actions only)
  save_inference_chunks: true                                                                     # also save raw per-inference action chunks (pre-RTC) -> inference_chunks.npz for visualization/cat10
  output_dir: "./output_actions"                                                                  # where rtc_selected_actions.npy, inference_chunks.npz and rollouts are written

robot:
  left_channel: "can_left"                                                                        # physical left arm CAN interface
  right_channel: "can_right"                                                                      # physical right arm CAN interface
  bitrate: 1000000                                                                                # CAN bus bitrate (1 Mbit/s)
  speed_pct: 15                                                                                   # joint command speed scaling 0-100 (%)
  max_linear_vel: 0.5                                                                             # chassis linear velocity cap (m/s) - unused if no base motion
  max_angular_vel: 0.1                                                                            # chassis angular velocity cap (rad/s)
  max_linear_acc: 0.1                                                                             # chassis linear acceleration cap (m/s^2)
  max_angular_acc: 0.05                                                                           # chassis angular acceleration cap (rad/s^2)
  action_safety_threshold: 1.5                                                                    # abort if mean|action - last_action| > this (jump guard)
  state_safety_threshold: 0.3                                                                     # abort if mean|current_state - last_action| > this (state-tracking guard; code: robot_runtime.py:439)
